<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Logo – toodoo services</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f0f0f0; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 32px; }
h1 { font-size: 1.3rem; color: #333; }
.row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
.card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 20px; min-width: 280px; }
.card.dark { background: #1C1F2E; }
.label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #999; }
.card.dark .label { color: rgba(255,255,255,0.3); }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-text { display: flex; flex-direction: column; line-height: 1.1; }
.main { font-size: 1.5rem; font-weight: 800; color: #1C1F2E; letter-spacing: -0.03em; }
.sub { font-size: 0.6rem; font-weight: 700; color: #F47C0A; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 1px; }
.dark .main { color: #fff; }

/* Sizes */
.size-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.size-label { font-size: 0.7rem; color: #aaa; }

.approve-btn { background: #F47C0A; color: white; border: none; padding: 14px 32px; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
.approve-btn:hover { background: #D4620A; }
</style>
</head>
<body>
<h1>Haus + Zahnräder Logo — toodoo services</h1>

<div class="row">
  <!-- Hell -->
  <div class="card">
    <span class="label">Auf hellem Hintergrund</span>
    <div class="logo">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="12" fill="#1C1F2E"/>
        <!-- House roof -->
        <path d="M26 7 L8 22 L8 44 L44 44 L44 22 Z" fill="none" stroke="#F47C0A" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Roof ridge line -->
        <path d="M26 7 L44 22" stroke="#F47C0A" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Big center gear inside house -->
        <circle cx="26" cy="32" r="6" fill="none" stroke="#F47C0A" stroke-width="2"/>
        <circle cx="26" cy="32" r="2.5" fill="#F47C0A"/>
        <!-- Gear teeth (8 teeth) -->
        <path d="M26 24v2.5M26 37.5V40M18.5 32H21M31 32h2.5M20.2 26.2l1.8 1.8M30 36l1.8 1.8M20.2 37.8l1.8-1.8M30 28l1.8-1.8" stroke="#F47C0A" stroke-width="2" stroke-linecap="round"/>
        <!-- Small gear top-right inside house -->
        <circle cx="36" cy="27" r="3.5" fill="none" stroke="#F47C0A" stroke-width="1.5" opacity="0.7"/>
        <circle cx="36" cy="27" r="1.5" fill="#F47C0A" opacity="0.7"/>
        <path d="M36 22.5v1.5M36 30.5V32M31.5 27H33M39 27h1.5M32.9 23.9l1.1 1.1M38 29l1.1 1.1M32.9 30.1l1.1-1.1M38 25l1.1-1.1" stroke="#F47C0A" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <div class="logo-text">
        <span class="main">toodoo</span>
        <span class="sub">services</span>
      </div>
    </div>

    <!-- Different sizes -->
    <span class="label">Verschiedene Größen</span>
    <div class="size-row">
      <div style="display:flex;align-items:center;gap:6px">
        <svg width="28" height="28" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="12" fill="#1C1F2E"/>
          <path d="M26 7 L8 22 L8 44 L44 44 L44 22 Z" fill="none" stroke="#F47C0A" stroke-width="3" stroke-linejoin="round"/>
          <path d="M26 7 L44 22" stroke="#F47C0A" stroke-width="3" stroke-linecap="round"/>
          <circle cx="26" cy="32" r="6" fill="none" stroke="#F47C0A" stroke-width="2.5"/>
          <circle cx="26" cy="32" r="2.5" fill="#F47C0A"/>
          <path d="M26 24v2.5M26 37.5V40M18.5 32H21M31 32h2.5M20.2 26.2l1.8 1.8M30 36l1.8 1.8M20.2 37.8l1.8-1.8M30 28l1.8-1.8" stroke="#F47C0A" stroke-width="2" stroke-linecap="round"/>
          <circle cx="36" cy="27" r="3.5" fill="none" stroke="#F47C0A" stroke-width="1.5" opacity="0.7"/>
          <circle cx="36" cy="27" r="1.5" fill="#F47C0A" opacity="0.7"/>
        </svg>
        <span class="size-label">Klein</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <svg width="44" height="44" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="12" fill="#1C1F2E"/>
          <path d="M26 7 L8 22 L8 44 L44 44 L44 22 Z" fill="none" stroke="#F47C0A" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M26 7 L44 22" stroke="#F47C0A" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="26" cy="32" r="6" fill="none" stroke="#F47C0A" stroke-width="2"/>
          <circle cx="26" cy="32" r="2.5" fill="#F47C0A"/>
          <path d="M26 24v2.5M26 37.5V40M18.5 32H21M31 32h2.5M20.2 26.2l1.8 1.8M30 36l1.8 1.8M20.2 37.8l1.8-1.8M30 28l1.8-1.8" stroke="#F47C0A" stroke-width="2" stroke-linecap="round"/>
          <circle cx="36" cy="27" r="3.5" fill="none" stroke="#F47C0A" stroke-width="1.5" opacity="0.7"/>
          <circle cx="36" cy="27" r="1.5" fill="#F47C0A" opacity="0.7"/>
        </svg>
        <span class="size-label">Nav</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <svg width="72" height="72" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="12" fill="#1C1F2E"/>
          <path d="M26 7 L8 22 L8 44 L44 44 L44 22 Z" fill="none" stroke="#F47C0A" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M26 7 L44 22" stroke="#F47C0A" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="26" cy="32" r="6" fill="none" stroke="#F47C0A" stroke-width="2"/>
          <circle cx="26" cy="32" r="2.5" fill="#F47C0A"/>
          <path d="M26 24v2.5M26 37.5V40M18.5 32H21M31 32h2.5M20.2 26.2l1.8 1.8M30 36l1.8 1.8M20.2 37.8l1.8-1.8M30 28l1.8-1.8" stroke="#F47C0A" stroke-width="2" stroke-linecap="round"/>
          <circle cx="36" cy="27" r="3.5" fill="none" stroke="#F47C0A" stroke-width="1.5" opacity="0.7"/>
          <circle cx="36" cy="27" r="1.5" fill="#F47C0A" opacity="0.7"/>
        </svg>
        <span class="size-label">Groß</span>
      </div>
    </div>
  </div>

  <!-- Dunkel -->
  <div class="card dark">
    <span class="label">Auf dunklem Hintergrund (wie Hero)</span>
    <div class="logo">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <rect width="52" height="52" rx="12" fill="#F47C0A"/>
        <path d="M26 7 L8 22 L8 44 L44 44 L44 22 Z" fill="none" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M26 7 L44 22" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="26" cy="32" r="6" fill="none" stroke="#fff" stroke-width="2"/>
        <circle cx="26" cy="32" r="2.5" fill="#fff"/>
        <path d="M26 24v2.5M26 37.5V40M18.5 32H21M31 32h2.5M20.2 26.2l1.8 1.8M30 36l1.8 1.8M20.2 37.8l1.8-1.8M30 28l1.8-1.8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="36" cy="27" r="3.5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
        <circle cx="36" cy="27" r="1.5" fill="#fff" opacity="0.8"/>
      </svg>
      <div class="logo-text">
        <span class="main">toodoo</span>
        <span class="sub">services</span>
      </div>
    </div>

    <!-- Orange variant -->
    <div class="logo">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <rect width="52" height="52" rx="12" fill="rgba(244,124,10,0.15)" stroke="#F47C0A" stroke-width="1.5"/>
        <path d="M26 7 L8 22 L8 44 L44 44 L44 22 Z" fill="none" stroke="#F47C0A" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M26 7 L44 22" stroke="#F47C0A" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="26" cy="32" r="6" fill="none" stroke="#F47C0A" stroke-width="2"/>
        <circle cx="26" cy="32" r="2.5" fill="#F47C0A"/>
        <path d="M26 24v2.5M26 37.5V40M18.5 32H21M31 32h2.5M20.2 26.2l1.8 1.8M30 36l1.8 1.8M20.2 37.8l1.8-1.8M30 28l1.8-1.8" stroke="#F47C0A" stroke-width="2" stroke-linecap="round"/>
        <circle cx="36" cy="27" r="3.5" fill="none" stroke="#F47C0A" stroke-width="1.5" opacity="0.7"/>
        <circle cx="36" cy="27" r="1.5" fill="#F47C0A" opacity="0.7"/>
      </svg>
      <div class="logo-text">
        <span class="main">toodoo</span>
        <span class="sub">services</span>
      </div>
    </div>
    <span class="label" style="margin-top:4px">↑ Auch als transparente Variante möglich</span>
  </div>
</div>

<button class="approve-btn" onclick="alert('Super! Sag Claude Bescheid, dann wird alles damit umgesetzt.')">
  ✓ Dieses Logo gefällt mir — umsetzen!
</button>

</body>
</html>
